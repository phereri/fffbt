_version: 6
agent:
  name: mobilerun
  max_steps: 40
  reasoning: true
  streaming: true
  vision_only: false
  after_sleep_action: 1.0
  wait_for_stable_ui: 0.5
  use_normalized_coordinates: false
  fast_agent:
    vision: false
    parallel_tools: true
  manager:
    vision: false
    stateless: false
  executor:
    vision: false
  app_cards:
    enabled: true
    mode: local
    app_cards_dir: config/mobilerun/app_cards
llm_profiles:
  default:
    provider: OpenAILike
    model: gemini-2.5-flash
    temperature: 0.2
    api_key_source: env
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    provider_family: openai
  manager:
    provider: OpenAILike
    model: gemini-2.5-flash
    temperature: 0.2
    api_key_source: env
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    provider_family: openai
  executor:
    provider: OpenAILike
    model: gemini-2.5-flash
    temperature: 0.1
    api_key_source: env
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    provider_family: openai
  fast_agent:
    provider: OpenAILike
    model: gemini-2.5-flash-lite
    temperature: 0.1
    api_key_source: env
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    provider_family: openai
  vision:
    provider: OpenAILike
    model: gemini-2.5-flash
    temperature: 0.2
    api_key_source: env
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    provider_family: openai
  app_opener:
    provider: OpenAILike
    model: gemini-2.5-flash-lite
    temperature: 0.0
    api_key_source: env
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    provider_family: openai
  structured_output:
    # NATIVE Gemini (not the OpenAI-compat shim): Google's /openai/ endpoint
    # rejects LlamaIndex's function-calling structured_predict ("Function
    # calling config set without function_declarations"). The native GoogleGenAI
    # provider does structured output correctly. Reads GOOGLE_API_KEY.
    provider: GoogleGenAI
    model: gemini-2.5-flash
    temperature: 0.0
    api_key_source: env
    provider_family: google
device:
  serial: null
  control_backend: null
  device_id: auto
  use_tcp: true
  platform: android
  auto_setup: false
telemetry:
  enabled: true
tracing:
  enabled: false
  provider: phoenix
logging:
  debug: false
  save_trajectory: action
  trajectory_path: trajectories
  rich_text: false
  trajectory_gifs: true
tools:
  stealth: true
  disabled_tools: null
credentials:
  enabled: false
  file_path: config/mobilerun/credentials.yaml
external_agents: {}
